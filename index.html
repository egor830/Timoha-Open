<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TIMOHA/OPEN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="side-menu">
        <div class="menu-trigger">☰</div>
        <div class="nav-links">
            <button onclick="router('cases')">📦 Кейсы</button>
            <button onclick="router('inventory')">🎒 Инвентарь</button>
            <button onclick="router('upgrade')">⚡ Апгрейд</button>
            <button onclick="router('contract')">📜 Контракты</button>
        </div>
    </nav>

    <header>
        <!-- Клик по логотипу теперь возвращает на главную -->
        <div class="logo" onclick="router('cases')">TIMOHA/OPEN</div>
        <div class="header-right">
            <div class="tg-bonus" onclick="getTgBonus()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://w3.org">
                    <path d="M20.665 3.717l-17.73 6.837c-1.21.486-1.203 1.161-.222 1.462l4.552 1.42 10.532-6.645c.498-.303.953-.14.579.192l-8.533 7.703-.33 4.955c.488 0 .702-.223.974-.488l2.338-2.274 4.861 3.592c.896.495 1.541.239 1.764-.834l3.189-15.022c.326-1.309-.5-1.902-1.355-1.547z" fill="white""")/>>
                </svg>
            </div>
            <div class="balance-card">Баланс: <span id="balance">0</span> ₽</div>
        </div>
    </header>

    <main>
        <section id="sec-cases" class="page"><div class="grid" id="casesGrid"></div></section>

        <section id="sec-open-case" class="page" style="display:none">
            <!-- Кнопка "Назад" удалена по просьбе -->
            <div class="case-open-container">
                <div id="case-info-header"></div>
                <div class="roulette-wrapper">
                    <div class="roulette-line"></div>
                    <div class="roulette-container" id="rouletteTrack"></div>
                </div>
                <div class="open-buttons-row">
                    <button class="action-btn btn-fast" id="btnFast">БЫСТРО</button>
                    <button class="action-btn btn-slow" id="btnSlow">МЕДЛЕННО</button>
                </div>
                <h3 class="content-title">Содержимое кейса:</h3>
                <div class="grid" id="case-items-inner"></div>
            </div>
        </section>

        <section id="sec-inventory" class="page" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>Инвентарь</h2>
                <button class="action-btn sell-btn" style="width:auto; padding:10px 20px;" onclick="sellAll()">Продать всё</button>
            </div>
            <div class="grid" id="inventoryGrid"></div>
        </section>

        <section id="sec-upgrade" class="page" style="display:none">
            <div class="upgrade-container">
                <div id="up-item-box" class="selected-slot">Выберите скин</div>
                <div class="upgrade-area">
                    <div id="turbo-btn" class="turbo-icon" onclick="toggleTurbo()">⚡</div>
                    <div class="upgrade-visual">
                        <div id="pointer">▼</div>
                        <svg viewBox="0 0 100 100" id="wheel">
                            <circle cx="50" cy="50" r="45" class="bg-circle"></circle>
                            <circle cx="50" cy="50" r="45" id="progressCircle"></circle>
                        </svg>
                    </div>
                </div>
                <input type="range" id="upChance" min="5" max="95" value="50" oninput="updateWheel()">
                <p>Шанс: <span id="upLabel">50</span>% | Выигрыш: <span id="upWin">0</span> ₽</p>
                <button class="action-btn" id="runUpBtn" disabled onclick="runUpgrade()">КРУТИТЬ</button>
                <div class="grid" id="upInvGrid"></div>
            </div>
        </section>

        <section id="sec-contract" class="page" style="display:none">
            <div class="contract-box">
                <div id="conSelectedList" class="grid"></div>
                <p>Выбрано: <span id="conCount">0</span>/10 | Сумма: <span id="conSum">0</span> ₽</p>
                <button class="action-btn" id="conBtn" disabled onclick="runContract()">СОЗДАТЬ</button>
            </div>
            <div class="grid" id="conInvGrid"></div>
        </section>
    </main>
    

    <div id="drop-modal" class="modal-overlay" style="display:none">
        <div class="modal-content">
            <img id="m-img" src="" style="width: 200px; height: 150px; object-fit: contain;">
            <h3 id="m-name"></h3>
            <p id="m-price"></p>
            <div class="modal-buttons">
                <button class="action-btn" onclick="closeModal()">В инвентарь</button>
                <button class="action-btn sell-btn" id="m-sell">Продать</button>
            </div>
        </div>
    </div>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="script.js"></script>
</body>
</html>
